stages:
  - build
  - quality
  - sync

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  key: backend-maven
  paths:
    - .m2/repository

build_backend:
  stage: build
  image: maven:3.9.9-eclipse-temurin-17
  script:
    - mvn -B -DskipTests compile
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - target/

checkstyle_backend:
  stage: quality
  image: maven:3.9.9-eclipse-temurin-17
  script:
    - mvn -B checkstyle:check

sync_backend_to_github:
  stage: sync
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
  before_script:
    - apk add --no-cache git rsync
  script:
    - |
      if [ -z "$GH_PUSH_USER" ] || [ -z "$GH_PUSH_TOKEN" ] || [ -z "$GH_MONOREPO_URL" ] || [ -z "$GH_SYNC_EMAIL" ]; then
        echo "Missing required CI variables: GH_PUSH_USER, GH_PUSH_TOKEN, GH_MONOREPO_URL, GH_SYNC_EMAIL"
        exit 1
      fi
    - git clone "https://${GH_PUSH_USER}:${GH_PUSH_TOKEN}@${GH_MONOREPO_URL}" github-mono
    - cd github-mono
    - git config user.name "${GH_PUSH_USER}"
    - git config user.email "${GH_SYNC_EMAIL}"
    - git checkout main || git checkout -b main
    - mkdir -p backend
    - rsync -a --delete --exclude '.git/' "${CI_PROJECT_DIR}/" "backend/"
    - git add backend
    - |
      if git diff --cached --quiet; then
        echo "No backend changes to sync."
        exit 0
      fi
    - git commit -m "chore(sync): backend from GitLab ${CI_COMMIT_SHORT_SHA}"
    - git push origin main
