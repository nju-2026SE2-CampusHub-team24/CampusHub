stages:
  - build
  - quality

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  key: backend-maven
  paths:
    - .m2/repository

build_backend:
  stage: build
  image: maven:3.9.9-eclipse-temurin-17
  script:
    - mvn -B -DskipTests compile
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - target/

checkstyle_backend:
  stage: quality
  image: maven:3.9.9-eclipse-temurin-17
  script:
    - mvn -B checkstyle:check
