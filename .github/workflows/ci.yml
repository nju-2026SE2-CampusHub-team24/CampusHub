name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend Compile and Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect backend project
        id: backend_exists
        run: |
          if [ -f backend/pom.xml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java
        if: steps.backend_exists.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile
        if: steps.backend_exists.outputs.exists == 'true'
        run: mvn -B -f backend/pom.xml -DskipTests compile

      - name: Style Check
        if: steps.backend_exists.outputs.exists == 'true'
        run: mvn -B -f backend/pom.xml checkstyle:check

      - name: Skip backend checks
        if: steps.backend_exists.outputs.exists != 'true'
        run: echo "No backend/pom.xml found, skip backend checks."

  frontend:
    name: Frontend Build and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect frontend project
        id: frontend_exists
        run: |
          if [ -f frontend/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.frontend_exists.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        if: steps.frontend_exists.outputs.exists == 'true'
        run: npm install --prefix frontend

      - name: Build
        if: steps.frontend_exists.outputs.exists == 'true'
        run: npm run build --prefix frontend

      - name: Lint
        if: steps.frontend_exists.outputs.exists == 'true'
        run: npm run lint --prefix frontend

      - name: Skip frontend checks
        if: steps.frontend_exists.outputs.exists != 'true'
        run: echo "No frontend/package.json found, skip frontend checks."
