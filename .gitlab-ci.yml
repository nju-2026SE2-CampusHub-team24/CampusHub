stages:
  - quality
  - build

default:
  interruptible: true

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

frontend_lint:
  stage: quality
  image: node:20
  cache:
    key: frontend-node
    paths:
      - frontend/.npm/
  before_script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint
  rules:
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml

frontend_build:
  stage: build
  image: node:20
  cache:
    key: frontend-node
    paths:
      - frontend/.npm/
  before_script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run build
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - frontend/dist/
  rules:
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml

backend_checkstyle:
  stage: quality
  image: maven:3.9.9-eclipse-temurin-17
  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  cache:
    key: backend-maven
    paths:
      - backend/.m2/repository
  before_script:
    - cd backend
  script:
    - mvn -B checkstyle:check
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml

backend_build:
  stage: build
  image: maven:3.9.9-eclipse-temurin-17
  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  cache:
    key: backend-maven
    paths:
      - backend/.m2/repository
  before_script:
    - cd backend
  script:
    - mvn -B -DskipTests compile
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - backend/target/
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml

docs_structure_check:
  stage: quality
  image: alpine:3.20
  script:
    - test -d docs/P0
    - test -d docs/P1
    - find docs -type f -name "*.md" | wc -l | awk '{ if ($1 < 1) exit 1; }'
  rules:
    - changes:
        - docs/**/*
        - .gitlab-ci.yml