stages:
  - build
  - quality

cache:
  key: frontend-node
  paths:
    - .npm/

before_script:
  - npm ci --cache .npm --prefer-offline

build_frontend:
  stage: build
  image: node:20
  script:
    - npm run build
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - dist/

lint_frontend:
  stage: quality
  image: node:20
  script:
    - npm run lint
